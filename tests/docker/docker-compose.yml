version: "3.8"

services:
  amps-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: amps-test-server
    ports:
      - "9007:9007"
      - "9008:9008"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9007 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
